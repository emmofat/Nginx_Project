name: Build and Deploy Nginx Docker Container

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'nginx/**'
      - 'html/**'
      - 'Dockerfile'
  pull_request:
    branches: [ main ]

# Environment variables
env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: nginx-web-app
  DEPLOY_PATH: /var/www/nginx

jobs:
  # JOB 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t ${{ env.IMAGE_NAME }}:test .
    
    - name: Run container for testing
      run: |
        docker run -d --name test-nginx -p 8080:80 ${{ env.IMAGE_NAME }}:test
        sleep 5  # Wait for nginx to start
    
    - name: Test nginx response
      run: |
        curl -f http://localhost:8080/ || exit 1
    
    - name: Test nginx configuration
      run: |
        docker exec test-nginx nginx -t
    
    - name: Clean up test container
      run: |
        docker stop test-nginx
        docker rm test-nginx

  # JOB 2: Push to Registry (only on main branch)
  push-to-registry:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build and push with version tags
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # JOB 3: Deploy to Production Server
  deploy-production:
    needs: push-to-registry
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://your-domain.com
    
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT | default }}
        script: |
          # Pull latest image
          echo "Pulling latest Nginx image..."
          docker pull ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          
          # Stop and remove existing container if running
          echo "Stopping old container..."
          docker stop nginx-web-app || true
          docker rm nginx-web-app || true
          
          # Run new container with proper settings
          echo "Starting new container..."
          docker run -d \
            --name nginx-web-app \
            --restart unless-stopped \
            -p 80:80 \
            -p 443:443 \
            -v /etc/nginx/ssl:/etc/nginx/ssl:ro \
            --log-opt max-size=10m \
            --log-opt max-file=3 \
            ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          
          # Verify container is running
          sleep 5
          if docker ps | grep -q nginx-web-app; then
            echo "✅ Container started successfully"
            docker ps --filter name=nginx-web-app
          else
            echo "❌ Container failed to start"
            docker logs nginx-web-app
            exit 1
          fi
          
          # Clean up old images
          docker image prune -a -f --filter "until=24h"

  # Optional: Deploy to Staging
  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
    
    steps:
    - name: Deploy to staging server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker pull ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker stop nginx-staging || true
          docker rm nginx-staging || true
          docker run -d --name nginx-staging --restart unless-stopped -p 8080:80 \
            ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
